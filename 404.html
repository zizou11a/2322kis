<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — ImgSwift</title>
  <meta name="description" content="This page doesn't exist. Head back to ImgSwift to convert, compress, and resize images free online.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://imgswift.xyz/">
  <meta property="og:title" content="Page Not Found — ImgSwift">
  <meta property="og:description" content="This page doesn't exist. Try one of our free image tools.">
  <meta property="og:url" content="https://imgswift.xyz/">
  <meta property="og:image" content="https://imgswift.xyz/og/default-og.png">
<meta name="twitter:card" content="summary_large_image">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/png">
  <meta name="theme-color" content="#080c12">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080c12;--surface:#0f1620;--card:#141c28;--border:#1e2d42;
      --accent:#4f8ef7;--accent-g:linear-gradient(135deg,#4f8ef7,#7b5bf6);
      --text:#e2eaf6;--text-2:#b0bdd0;--muted:#607080;--green:#22c55e;
    }
    @media(prefers-color-scheme:light){
      :root{--bg:#f0f4fa;--surface:#fff;--card:#fff;--border:#dde3f0;--text:#0f172a;--text-2:#475569;--muted:#94a3b8}
    }
    body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}

    .code{font-size:clamp(6rem,20vw,10rem);font-weight:900;line-height:1;background:var(--accent-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;margin-bottom:12px;color:var(--text)}
    p{font-size:1rem;color:var(--text-2);max-width:480px;margin:0 auto 36px;line-height:1.7}

    .tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;max-width:680px;width:100%;margin:0 auto 36px}
    .tool-link{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 12px;background:var(--card);border:1px solid var(--border);border-radius:14px;color:var(--text-2);text-decoration:none;font-size:0.875rem;font-weight:600;transition:all 0.2s}
    .tool-link:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,0.06);text-decoration:none}
    .tool-link .icon{font-size:1.6rem}

    .home-btn{display:inline-block;background:var(--accent-g);color:#fff;font-weight:700;font-size:1rem;padding:14px 36px;border-radius:14px;text-decoration:none;transition:opacity 0.2s}
    .home-btn:hover{opacity:0.88;text-decoration:none}

    .brand{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-size:1.1rem;font-weight:800;color:var(--text);text-decoration:none}
    .brand span{background:var(--accent-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  </style>
</head>
<body>

  <a href="/" class="brand">⚡ Img<span>Swift</span></a>

  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist or was moved. Try one of our most popular free image tools below, or head back to the homepage.</p>

  <div class="tools-grid">
    <a href="/jpg-to-webp/" class="tool-link">
      <span class="icon">⚡</span>
      JPG → WebP
    </a>
    <a href="/compress-image/" class="tool-link">
      <span class="icon">📦</span>
      Compress Image
    </a>
    <a href="/resize-image/" class="tool-link">
      <span class="icon">📐</span>
      Resize Image
    </a>
    <a href="/jpg-to-png/" class="tool-link">
      <span class="icon">🖼️</span>
      JPG → PNG
    </a>
    <a href="/remove-exif-data/" class="tool-link">
      <span class="icon">🧹</span>
      Remove EXIF
    </a>
    <a href="/crop-image/" class="tool-link">
      <span class="icon">✂️</span>
      Crop Image
    </a>
    <a href="/pdf-to-image/" class="tool-link">
      <span class="icon">📑</span>
      PDF → Image
    </a>
    <a href="/jpg-to-avif/" class="tool-link">
      <span class="icon">🚀</span>
      JPG → AVIF
    </a>
  </div>

  <a href="/" class="home-btn">← Back to All Tools</a>

  <script>
    // Auto-redirect after 15 seconds if user doesn't click
    // (soft redirect, gives user time to choose)
    // setTimeout(() => { window.location.href = '/'; }, 15000);
  </script>
</body>
</html>
